  <script>
  const data = {
    meta: { course: "OOP with C++", sheetTitle: "Sheet 6" },
    sections: [

      // ── MCQ ────────────────────────────────────────────────────────
      {
        id: "mcq", title: "MCQ",
        items: [
          {
            q: "A class called Employee is created using public inheritance from a class called Person. What does this mean for Employee?",
            options: [
              "Create a completely new class with no connection to the base class",
              "Access and extend the features of an existing base class",
              "Prevent the base class from being used anywhere else",
              "Replace the base class entirely"
            ],
            correctIndex: 1,
            category: "Concept"
          },
          {
            q: "Which syntax correctly makes Employee inherit from Person?",
            options: [
              "class Employee extends Person",
              "class Employee inherits Person",
              "class Employee : public Person",
              "class Employee -> Person"
            ],
            correctIndex: 2,
            category: "Syntax"
          },
          {
            q: "A class called Person has a private member called name. A class called Employee inherits from Person using public inheritance. Can Employee access name directly inside its constructor?",
            options: [
              "Yes, because Employee inherits from Person",
              "Yes, but only inside the constructor",
              "No, private members are never directly accessible in a derived class",
              "Yes, if the inheritance mode is public"
            ],
            correctIndex: 2,
            category: "Access"
          },
          {
            q: "A class called Employee inherits from a class called Person. Both classes have a function called printInfo(). When you call printInfo() on an Employee object, which version runs?",
            options: [
              "Person's version always runs first",
              "Both versions run at the same time",
              "Employee's version runs — the derived class takes priority",
              "It depends on which constructor was used"
            ],
            correctIndex: 2,
            category: "Overriding"
          },
          {
            q: "A class called Employee inherits from a class called Person. When you create an Employee object in main(), which constructor runs first?",
            options: [
              "Employee's constructor runs first",
              "Neither — only one constructor runs",
              "They run at the same time",
              "Person's constructor runs first"
            ],
            correctIndex: 3,
            category: "Constructors"
          },
          {
            q: "A class called Employee uses the public inheritance mode from a class called Person. Person has a public member function called printInfo() and a protected member called age. What happens to these two members inside Employee?",
            options: [
              "printInfo() becomes private in Employee and age becomes public",
              "printInfo() stays public in Employee and age stays protected",
              "Both become private in Employee",
              "Both become protected in Employee"
            ],
            correctIndex: 1,
            category: "Inheritance Mode — public"
          },
          {
            q: "A class called Employee uses the protected inheritance mode from a class called Person. Person has a public member function called printInfo(). What happens to printInfo() inside Employee when using the protected mode?",
            options: [
              "printInfo() stays public in Employee",
              "printInfo() becomes protected in Employee",
              "printInfo() becomes private in Employee",
              "printInfo() is removed and cannot be used"
            ],
            correctIndex: 1,
            category: "Inheritance Mode — protected"
          },
          {
            q: "In a multilevel inheritance setup, Person is the base class, Employee inherits from Person, and Programmer inherits from Employee. What does the Programmer class inherit?",
            options: [
              "Only the members of Employee",
              "Only the members of Person",
              "The members of both Employee and Person",
              "Nothing — multilevel inheritance is not allowed in C++"
            ],
            correctIndex: 2,
            category: "Multilevel Inheritance"
          },
          {
            q: "A class called PlayerPerson needs features from both a Person class and a Player class at the same time. Which type of inheritance allows a single class to inherit from two base classes?",
            options: [
              "Single inheritance — PlayerPerson inherits from Person only",
              "Multilevel inheritance — Person inherits from Player",
              "Multiple inheritance — PlayerPerson inherits from both Person and Player",
              "This cannot be done in C++"
            ],
            correctIndex: 2,
            category: "Multiple Inheritance"
          }
        ]
      },

      // ── T/F ────────────────────────────────────────────────────────
      {
        id: "tf", title: "True / False",
        items: [
          {
            q: "A class called Employee inherits from a class called Person using public inheritance. Person has a public function called printInfo(). Employee can call printInfo() without defining it again.",
            answer: "True"
          },
          {
            q: "A class called Person has a private member called salary. A class called Employee inherits from Person. Inside Employee's constructor, it is valid to write salary = 5000.0 directly.",
            answer: "False"
          },
          {
            q: "A class called Person has a function called printInfo(). A class called Employee inherits from Person and also defines a function called printInfo() with the same parameters. This is called function overriding.",
            answer: "True"
          },
          {
            q: "A class called Employee inherits from Person and overrides printInfo(). Inside Employee's printInfo(), writing Person::printInfo() runs Person's version and prints Person's data as well.",
            answer: "True"
          },
          {
            q: "A class called Person declares a member called age as protected. A class called Employee inherits from Person. Inside Employee's member functions, writing age = age + 1 is valid and will not cause a compile error.",
            answer: "True"
          }
        ]
      },

      // ── OUTPUT ─────────────────────────────────────────────────────
      {
        id: "output", title: "What is the Output?",
        items: [
          {
            q: "What is the output of the following code?",
            code: `#include <iostream>
using namespace std;

class Person {
public:
    Person() {
        cout << "Person constructor" << endl;
    }
    ~Person() {
        cout << "Person destructor" << endl;
    }
};

class Employee : public Person {
public:
    Employee() {
        cout << "Employee constructor" << endl;
    }
    ~Employee() {
        cout << "Employee destructor" << endl;
    }
};

int main() {
    Employee emp;
    return 0;
}`,
            answer: `Person constructor
Employee constructor
Employee destructor
Person destructor`,
            category: "Constructor Order"
          },
          {
            q: "What is the output of the following code?",
            code: `#include <iostream>
using namespace std;

class Person {
private:
    string name;
    int age;
public:
    Person(string n, int a) {
        name = n;
        age  = a;
    }
    void printInfo() {
        cout << "Name: " << name << endl;
        cout << "Age:  " << age  << endl;
    }
};

class Employee : public Person {
private:
    int    id;
    double salary;
public:
    Employee(string n, int a, int i, double s)
        : Person(n, a) {
        id     = i;
        salary = s;
    }
    void printInfo() {
        Person::printInfo();
        cout << "ID:     " << id     << endl;
        cout << "Salary: " << salary << endl;
    }
};

int main() {
    Employee emp("Ahmed", 30, 1, 5000.0);
    emp.printInfo();
    return 0;
}`,
            answer: `Name: Ahmed
Age:  30
ID:     1
Salary: 5000`,
            category: "Inheritance + Override"
          }
        ]
      },

      // ── ERROR ──────────────────────────────────────────────────────
      {
        id: "error", title: "What is the Error?",
        items: [
          {
            q: "Find the error in this code and explain why it happens.",
            code: `#include <iostream>
using namespace std;

class Person {
private:
    string name;
    int    age;
public:
    Person(string n, int a) {
        name = n;
        age  = a;
    }
};

class Employee : public Person {
private:
    double salary;
public:
    Employee(string n, int a, double s) {
        name   = n;
        age    = a;
        salary = s;
    }
};

int main() {
    Employee emp("Ahmed", 30, 5000.0);
    return 0;
}`,
            answer: `The error is in these two lines inside Employee's constructor:

    name = n;
    age  = a;

name and age are private members of Person. Private members are never directly accessible in a derived class, even through inheritance. Employee cannot set them directly.

Fix: Remove those two lines and call Person's parameterized constructor using the initializer list:

    Employee(string n, int a, double s) : Person(n, a) {
        salary = s;
    }

This passes n and a up to Person's constructor, which sets name and age itself.`,
            category: "Private Access"
          },
          {
            q: "Find the error in this code and explain why it happens.",
            code: `#include <iostream>
using namespace std;

class Person {
public:
    void printInfo() {
        cout << "Person info" << endl;
    }
    void sayHello() {
        cout << "Hello from Person" << endl;
    }
};

class Employee : private Person {   // private inheritance mode
};

int main() {
    Employee emp;
    emp.printInfo();
    emp.sayHello();
    return 0;
}`,
            answer: `The error is in main():

    emp.printInfo();
    emp.sayHello();

Employee uses private inheritance from Person. With private inheritance, all public members of Person become private inside Employee. This means printInfo() and sayHello() are private inside Employee and cannot be called from outside the class.

Fix: Change the inheritance mode from private to public:

    class Employee : public Person { };

With public inheritance, printInfo() and sayHello() remain public in Employee and can be called freely from main().`,
            category: "Inheritance Mode — private"
          }
        ]
      },

      // ── WRITE ──────────────────────────────────────────────────────
      {
        id: "write", title: "Write the Code",
        items: [
          {
            q: "Person class (base):\n  - Private members: name (string), age (int)\n  - Default constructor that sets name to \"Unknown\" and age to 0\n  - Parameterized constructor that sets both members\n  - Getters for name and age\n  - printInfo() that prints name and age\n\nEmployee class (derived from Person):\n  - Private members: employeeID (int), salary (double)\n  - Default constructor that sets employeeID to 0 and salary to 0.0\n  - Parameterized constructor that takes name, age, employeeID, and salary — call Person's constructor for name and age\n  - Getters for employeeID and salary\n  - Override printInfo() to print all Person data then all Employee data\n\nIn main():\n  - Create one Employee using the default constructor\n  - Create one Employee with name = \"Ahmed\", age = 22, employeeID = 1, salary = 9000.0\n  - Call printInfo() on both",
            category: "Person and Employee",
            code: `#include <iostream>
#include <string>
using namespace std;

class Person {
private:
    string name;
    int    age;
public:
    Person() {
        name = "Unknown";
        age  = 0;
    }
    Person(string n, int a) {
        name = n;
        age  = a;
    }
    string getName() const { return name; }
    int    getAge()  const { return age;  }

    void printInfo() {
        cout << "Name: " << name << endl;
        cout << "Age:  " << age  << endl;
    }
};

class Employee : public Person {
private:
    int    employeeID;
    double salary;
public:
    // Default constructor — Person's default constructor runs automatically
    Employee() {
        employeeID = 0;
        salary     = 0.0;
    }
    Employee(string n, int a, int id, double s) : Person(n, a) {
        employeeID = id;
        salary     = s;
    }
    int    getEmployeeID() const { return employeeID; }
    double getSalary()     const { return salary;     }

    void printInfo() {
        Person::printInfo();
        cout << "ID:     " << employeeID << endl;
        cout << "Salary: " << salary     << endl;
    }
};

int main() {
    Employee e1;
    Employee e2("Ahmed", 22, 1, 9000.0);

    e1.printInfo();
    cout << "---" << endl;
    e2.printInfo();

    return 0;
}`
          },
          {
            q: "Item class (base):\n  - Private members: itemID (int), name (string)\n  - Default constructor that sets itemID to 0 and name to \"Unknown\"\n  - Parameterized constructor that sets both members\n  - Getters for itemID and name\n  - printInfo() that prints itemID and name\n\nProduct class (derived from Item):\n  - Private members: price (double), quantity (int)\n  - Default constructor that sets price to 0.0 and quantity to 0\n  - Parameterized constructor that takes itemID, name, price, and quantity — call Item's constructor for itemID and name\n  - Getters for price and quantity\n  - Override printInfo() to print all Item data then price and quantity\n\nIn main():\n  - Create one Product using the default constructor\n  - Create one Product with itemID = 101, name = \"Laptop\", price = 3000.0, quantity = 5\n  - Call printInfo() on both",
            category: "Item and Product",
            code: `#include <iostream>
#include <string>
using namespace std;

class Item {
private:
    int    itemID;
    string name;
public:
    Item() {
        itemID = 0;
        name   = "Unknown";
    }
    Item(int id, string n) {
        itemID = id;
        name   = n;
    }
    int    getItemID() const { return itemID; }
    string getName()   const { return name;   }

    void printInfo() {
        cout << "Item ID: " << itemID << endl;
        cout << "Name:    " << name   << endl;
    }
};

class Product : public Item {
private:
    double price;
    int    quantity;
public:
    // Default constructor — Item's default constructor runs automatically
    Product() {
        price    = 0.0;
        quantity = 0;
    }
    Product(int id, string n, double p, int q) : Item(id, n) {
        price    = p;
        quantity = q;
    }
    double getPrice()    const { return price;    }
    int    getQuantity() const { return quantity; }

    void printInfo() {
        Item::printInfo();
        cout << "Price:    " << price    << endl;
        cout << "Quantity: " << quantity << endl;
    }
};

int main() {
    Product p1;
    Product p2(101, "Laptop", 3000.0, 5);

    p1.printInfo();
    cout << "---" << endl;
    p2.printInfo();

    return 0;

  // ── Engine ──────────────────────────────────────────────────────────
  const els = {
    tabs: document.getElementById("tabs"),
    content: document.getElementById("content"),
    answersSwitch: document.getElementById("answersSwitch"),
    themeSwitch: document.getElementById("themeSwitch"),
    searchInput: document.getElementById("searchInput"),
    btnPrint: document.getElementById("btnPrint")
  };

  let state = { activeSectionId: data.sections[0]?.id ?? null, showAnswers: false, theme: "light", search: "" };

  function setSwitch(el, on){ el.dataset.on = String(on); el.setAttribute("aria-checked", on ? "true" : "false"); }

  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    state.theme = theme;
    localStorage.setItem("sheet_theme", theme);
    setSwitch(els.themeSwitch, theme === "dark");
    if(window.Prism) setTimeout(() => Prism.highlightAll(), 0);
  }

  function applyAnswers(on){
    state.showAnswers = on;
    localStorage.setItem("sheet_answers", on ? "1" : "0");
    setSwitch(els.answersSwitch, on);
    document.querySelectorAll(".answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".output-answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".error-answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".tf-badge").forEach(b => { b.style.display = on ? "inline-block" : "none"; });
    document.querySelectorAll(".code-answer-wrap").forEach(w => { w.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".options .opt").forEach(li => {
      if(on && li.classList.contains("is-correct")) li.classList.add("correct");
      else li.classList.remove("correct");
    });
  }

  function esc(str){ return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

  function getActive(){ return data.sections.find(s => s.id === state.activeSectionId) ?? data.sections[0]; }

  function renderTabs(){
    els.tabs.innerHTML = "";
    data.sections.forEach(sec => {
      const btn = document.createElement("button");
      btn.className = "tab" + (sec.id === state.activeSectionId ? " active" : "");
      btn.innerHTML = `${sec.title} <span class="badge">${sec.items?.length ?? 0}</span>`;
      btn.addEventListener("click", () => { state.activeSectionId = sec.id; state.search = ""; els.searchInput.value = ""; renderTabs(); renderContent(); });
      els.tabs.appendChild(btn);
    });
  }

  function renderContent(){
    const sec = getActive();
    const filtered = (sec.items ?? []).filter(item => {
      if(!state.search.trim()) return true;
      return JSON.stringify(item).toLowerCase().includes(state.search.trim().toLowerCase());
    });

    els.content.innerHTML = filtered.map((item, idx) => {
      const num = idx + 1;
      const hasOptions = Array.isArray(item.options) && item.options.length;
      const hasCode    = !!item.code;
      const hasTextAns = typeof item.answer === "string" && item.answer.trim() !== "";
      const hasTf      = sec.id === "tf" && hasTextAns;
      const isOutput   = sec.id === "output";
      const isError    = sec.id === "error";
      const isWrite    = sec.id === "write";
      const catLabel   = item.category ? `${esc(sec.title)} &bull; ${esc(item.category)}` : esc(sec.title);
      const qClass     = isWrite ? "q write-question" : "q";

      return `
        <div class="${qClass}">
          <div class="qHead">
            <p class="qTitle">${num}) ${esc(item.q)}</p>
            <span class="qMeta">${catLabel}</span>
          </div>
          <div class="qBody">
            ${hasOptions ? `<ol class="options" type="A">${item.options.map((opt,i) => {
              const ic = typeof item.correctIndex === "number" && i === item.correctIndex;
              return `<li class="opt ${ic ? "is-correct" : ""}">${esc(opt)}</li>`;
            }).join("")}</ol>` : ""}
            ${hasTf ? `<div class="tf-badge ${item.answer === "True" ? "tf-true" : "tf-false"}">${esc(item.answer)}</div>` : ""}
            ${isOutput && hasTextAns ? `<div class="output-answer"><div class="label">&#x25BA; Output</div><div>${esc(item.answer)}</div></div>` : ""}
            ${isError  && hasTextAns ? `<div class="error-answer"><div class="label">&#x26A0; Error &amp; Fix</div><div>${esc(item.answer)}</div></div>` : ""}
            ${hasCode ? `
              <div class="${isWrite ? "code-answer-wrap" : "code-question-wrap"}">
                <div class="code-toolbar">
                  <div class="code-toolbar-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
                  <span class="code-toolbar-lang">C++</span>
                  <button class="copy-btn" type="button" data-code="${encodeURIComponent(item.code)}">&#x1F4CB; Copy</button>
                </div>
                <pre class="language-cpp"><code class="language-cpp">${esc(item.code)}</code></pre>
              </div>` : ""}
          </div>
        </div>`;
    }).join("");

    bindCopy();
    applyAnswers(state.showAnswers);
    if(window.Prism) setTimeout(() => Prism.highlightAll(), 0);
  }

  function bindCopy(){
    document.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const code = decodeURIComponent(btn.dataset.code || "");
        try { await navigator.clipboard.writeText(code); } catch(e) {
          const ta = document.createElement("textarea"); ta.value = code;
          document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
        }
        const old = btn.innerHTML;
        btn.innerHTML = "&#x2705; Copied"; btn.classList.add("copied");
        setTimeout(() => { btn.innerHTML = old; btn.classList.remove("copied"); }, 1400);
      });
    });
  }

  els.searchInput.addEventListener("input", e => { state.search = e.target.value; renderContent(); });
  els.btnPrint.addEventListener("click", () => window.print());
  els.answersSwitch.addEventListener("click", () => applyAnswers(!state.showAnswers));
  els.themeSwitch.addEventListener("click", () => applyTheme(state.theme === "dark" ? "light" : "dark"));

  (function init(){
    renderTabs(); renderContent();
    const saved = localStorage.getItem("sheet_theme");
    if(saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyAnswers(localStorage.getItem("sheet_answers") === "1");
  })();
  </script>
</body>
</html>
