  <script>
    const data = {
      meta: {
        course: "OOP with C++",

      },
      sections: [
        {
          id: "mcq",
          title: "MCQ",
          items: [
            {
              q: "What does operator overloading allow you to do?",
              options: [
                "Create a new operator symbol that does not exist in C++",

            {

                "operator+()",
                "overload+()"
              ],
              correctIndex: 2,
              category: "Syntax"
            },
            {
              q: "When you write e1 + e2 and the + operator is overloaded inside the Employee class, what is e1's role?",
              options: [
                "e1 is passed as a parameter to the function",
                "e1 is the caller — its data is available automatically inside the function",
                "e1 is ignored and only e2 is used",

              ],
              correctIndex: 1,

            },
            {
              q: "What return type should the == operator have when comparing two objects?",
              options: [

                "Employee",
                "bool"
              ],
              correctIndex: 3,
              category: "Comparison"
            },
            {
              q: "What is the purpose of the dummy int parameter in operator++(int)?",
              options: [
                "It holds the value to add during increment",
                "It tells C++ this is the postfix version, not the prefix version",
                "It sets the increment step to 1",
                "It is required by all operators that return a value"
              ],
              correctIndex: 1,
              category: "Increment"
            }
          ]
        },
        {
          id: "tf",
          title: "True / False",
          items: [
            {
              q: "You can create a completely new operator symbol in C++ using operator overloading.",
              answer: "False"
            },
            {
              q: "When an operator is defined inside the class, the left-side object is the caller and does not need to be passed as a parameter.",
              answer: "True"
            },
            {
              q: "The return type of an overloaded comparison operator like == must be bool.",
              answer: "True"
            },
            {
              q: "The const keyword at the end of an operator function means the function cannot modify the object's data.",
              answer: "True"
            },
            {
              q: "You can overload the ++ operator and use it like this: ++emp, where emp is an Employee object.",
              answer: "True"

          ]
        },
        {
          id: "output",
          title: "What is the Output?",
          items: [
            {
              q: "What is the output of the following code?",
              code: `#include <iostream>
using namespace std;

class Employee {
public:
    double salary;

    Employee(double s) {
        salary = s;
    }

    double operator+(Employee other) const {
        return salary + other.salary;
    }

    bool operator==(Employee other) const {
        return salary == other.salary;
    }
};

int main() {
    Employee e1(5000);
    Employee e2(7000);
    Employee e3(5000);

    cout << e1 + e2 << endl;
    cout << (e1 == e2) << endl;
    cout << (e1 == e3) << endl;

    return 0;
}`,
              answer: `12000
0
1`,
              category: "Arithmetic + Comparison"
            },
            {
              q: "What is the output of the following code?",
              code: `#include <iostream>
using namespace std;

class Employee {
public:
    double salary;

    Employee(double s) {
        salary = s;
    }

    Employee operator++() {
        salary = salary + 100;
        return *this;
    }

    Employee operator++(int) {
        Employee temp = *this;
        salary = salary + 100;
        return temp;
    }
};

int main() {
    Employee e1(5000);
    Employee e2 = ++e1;
    cout << e1.salary << endl;
    cout << e2.salary << endl;

    Employee e3(8000);
    Employee e4 = e3++;
    cout << e3.salary << endl;
    cout << e4.salary << endl;

    return 0;
}`,
              answer: `5100
5100
8100
8000`,
              category: "Prefix and Postfix"
            }
          ]
        },
        {
          id: "error",
          title: "What is the Error?",
          items: [
            {
              q: "Find the error in this code and explain why it happens.",
              code: `#include <iostream>
using namespace std;

class Employee {
private:
    double salary;
public:
    Employee(double s) {
        salary = s;
    }
    double getSalary() const { return salary; }
};

int main() {
    Employee e1(5000);
    Employee e2(3000);

    cout << e1 + e2 << endl;   // line A
    cout << (e1 == e2) << endl; // line B

    return 0;
}`,
              answer: `Errors on line A and line B.

Line A: e1 + e2
The + operator is not defined for the Employee class. C++ only knows how to use + with built-in types like int and double. For your own class, you must define what + means by overloading the operator.

Line B: e1 == e2
Same reason. The == operator has no meaning for Employee objects unless you overload it.

Fix: Add operator overloading inside the class:
  double operator+(Employee other) const { return salary + other.getSalary(); }
  bool   operator==(Employee other) const { return salary == other.getSalary(); }`,
              category: "Missing Overload"
            },
            {
              q: "Find the error in this code and explain why it happens.",
              code: `#include <iostream>
using namespace std;

class Employee {
public:
    double salary;

    Employee(double s) {
        salary = s;
    }

    double operator+(Employee other) const {
        salary = salary + 100;    // line A
        return salary + other.salary;
    }
};

int main() {
    Employee e1(5000);
    Employee e2(3000);
    cout << e1 + e2 << endl;
    return 0;
}`,
              answer: `Error on line A: salary = salary + 100;

The function is declared with const at the end, which means it cannot modify the object's data. Assigning a new value to salary inside a const function is not allowed.

Fix: Either remove the salary = salary + 100 line, or remove const from the function signature if you intentionally want to change the salary.`,

            }
          ]

          items: [
            {

              category: "Arithmetic",
              code: `#include <iostream>
using namespace std;

class Employee {
private:
    double salary;
public:
    Employee(double s) {
        salary = s;
    }

    double getSalary() const { return salary; }

    // Overload + : returns sum of both salaries
    double operator+(Employee other) const {
        return salary + other.salary;
    }
};

int main() {
    Employee e1(5000);
    Employee e2(7000);

    cout << "Combined salary: " << e1 + e2 << endl;
    // Output: Combined salary: 12000

    return 0;
}`
            },

              q: "Write a class called Employee with a private int member id and a private double member salary. Add a parameterized constructor and getters. Then:\n- Overload == to return true if both employees have the same id\n- Overload < to return true if the left employee has a lower salary\nIn main(), create three objects and test both operators.",
              category: "Comparison",
              code: `#include <iostream>
using namespace std;

class Employee {
private:
    int    id;
    double salary;
public:
    Employee(int i, double s) {
        id     = i;
        salary = s;
    }

    int    getId()     const { return id; }
    double getSalary() const { return salary; }

    // Overload == : same id means same employee
    bool operator==(Employee other) const {
        return id == other.getId();
    }

    // Overload < : compare by salary
    bool operator<(Employee other) const {
        return salary < other.getSalary();
    }
};

int main() {
    Employee e1(1, 5000);
    Employee e2(2, 7000);
    Employee e3(1, 6000);

    cout << (e1 == e2) << endl;   // 0 — different id
    cout << (e1 == e3) << endl;   // 1 — same id
    cout << (e1 < e2)  << endl;   // 1 — 5000 < 7000

    return 0;
}`
            },
            {
              q: "Write a class called Employee with a private double member salary. Add a parameterized constructor. Then overload both prefix ++ and postfix ++ so that each increments the salary by 500. In main(), show the difference between using ++e and e++.",
              category: "Increment",
              code: `#include <iostream>
using namespace std;

class Employee {
private:
    double salary;
public:
    Employee(double s) {
        salary = s;
    }

    double getSalary() const { return salary; }

    // Prefix ++e — increment first, return updated object
    Employee operator++() {
        salary = salary + 500;
        return *this;
    }

    // Postfix e++ — save old state, increment, return old state
    Employee operator++(int) {
        Employee temp = *this;
        salary = salary + 500;
        return temp;
    }
};

int main() {
    Employee e1(5000);
    Employee e2 = ++e1;
    cout << e1.getSalary() << endl;   // 5500 — e1 changed
    cout << e2.getSalary() << endl;   // 5500 — e2 gets the new value

    Employee e3(8000);
    Employee e4 = e3++;
    cout << e3.getSalary() << endl;   // 8500 — e3 changed
    cout << e4.getSalary() << endl;   // 8000 — e4 gets the old value

    return 0;
}`
            },
          ]
        }
      ]
    };

    const els = {
      tabs:          document.getElementById("tabs"),
      content:       document.getElementById("content"),
      answersSwitch: document.getElementById("answersSwitch"),
      themeSwitch:   document.getElementById("themeSwitch"),
      searchInput:   document.getElementById("searchInput"),
      btnPrint:      document.getElementById("btnPrint")
    };

    let state = {
      activeSectionId: data.sections[0]?.id ?? null,
      showAnswers: false,
      theme: "light",
      search: ""
    };

    function setSwitch(el, on){
      el.dataset.on = String(on);
      el.setAttribute("aria-checked", on ? "true" : "false");
    }

    function applyTheme(theme){
      document.documentElement.setAttribute("data-theme", theme);
      state.theme = theme;
      localStorage.setItem("sheet_theme", theme);
      setSwitch(els.themeSwitch, theme === "dark");
      if (window.Prism) Prism.highlightAll();
    }

    function applyAnswers(on){
      state.showAnswers = on;
      localStorage.setItem("sheet_answers", on ? "1" : "0");
      setSwitch(els.answersSwitch, on);

      document.querySelectorAll(".answer").forEach(a => {
        a.style.display = on ? "block" : "none";
      });
      document.querySelectorAll(".output-answer").forEach(a => {
        a.style.display = on ? "block" : "none";
      });
      document.querySelectorAll(".error-answer").forEach(a => {
        a.style.display = on ? "block" : "none";
      });
      document.querySelectorAll(".tf-badge").forEach(b => {
        b.style.display = on ? "inline-block" : "none";
      });
      document.querySelectorAll(".code-answer-wrap").forEach(w => {
        w.style.display = on ? "block" : "none";
      });
      document.querySelectorAll(".options .opt").forEach(li => {
        if (on && li.classList.contains("is-correct")) li.classList.add("correct");
        else li.classList.remove("correct");
      });
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function getActiveSection(){
      return data.sections.find(s => s.id === state.activeSectionId) ?? data.sections[0];
    }

    function renderTabs(){
      els.tabs.innerHTML = "";
      data.sections.forEach(sec => {
        const btn = document.createElement("button");
        btn.className = "tab" + (sec.id === state.activeSectionId ? " active" : "");
        const count = sec.items?.length ?? 0;
        btn.innerHTML = `${sec.title} <span class="badge">${count}</span>`;
        btn.addEventListener("click", () => {
          state.activeSectionId = sec.id;
          state.search = "";
          els.searchInput.value = "";
          renderTabs();
          renderContent();
        });
        els.tabs.appendChild(btn);
      });
    }

    function renderContent(){
      const sec = getActiveSection();
      const qItems = sec.items ?? [];

      const filtered = qItems.filter(item => {
        if (!state.search.trim()) return true;
        const hay = JSON.stringify(item).toLowerCase();
        return hay.includes(state.search.trim().toLowerCase());
      });

      els.content.innerHTML = filtered.map((item, idx) => {
        const num = idx + 1;
        const hasOptions   = Array.isArray(item.options) && item.options.length;
        const hasCode      = !!item.code;
        const hasTextAns   = typeof item.answer === "string" && item.answer.trim() !== "";
        const hasTfAnswer  = sec.id === "tf" && hasTextAns;
        const isOutput     = sec.id === "output";
        const isError      = sec.id === "error";
        const isWrite      = sec.id === "write";

        const categoryLabel = item.category
          ? `${escapeHtml(sec.title)} &bull; ${escapeHtml(item.category)}`
          : escapeHtml(sec.title);

        let qClass = "q";
        if (isWrite) qClass += " write-question";

        return `
          <div class="${qClass}">
            <div class="qHead">
              <p class="qTitle">${num}) ${escapeHtml(item.q)}</p>
              <span class="qMeta">${categoryLabel}</span>
            </div>

            <div class="qBody">
              ${hasOptions ? `
                <ol class="options" type="A">
                  ${item.options.map((opt, i) => {
                    const isCorrect = typeof item.correctIndex === "number" && i === item.correctIndex;
                    return `<li class="opt ${isCorrect ? "is-correct" : ""}">${escapeHtml(opt)}</li>`;
                  }).join("")}
                </ol>
              ` : ""}

              ${hasTfAnswer ? `
                <div class="tf-badge ${item.answer === "True" ? "tf-true" : "tf-false"}">${escapeHtml(item.answer)}</div>
              ` : ""}

              ${isOutput && hasTextAns ? `
                <div class="output-answer">
                  <div class="label">▶ Output</div>
                  <div>${escapeHtml(item.answer)}</div>
                </div>
              ` : ""}

              ${isError && hasTextAns ? `
                <div class="error-answer">
                  <div class="label">⚠ Error &amp; Fix</div>
                  <div>${escapeHtml(item.answer)}</div>
                </div>
              ` : ""}

              ${hasCode ? `
                <div class="${isWrite ? "code-answer-wrap" : "code-question-wrap"}">
                  <div class="code-toolbar">
                    <div class="code-toolbar-dots">
                      <span class="dot-r"></span>
                      <span class="dot-y"></span>
                      <span class="dot-g"></span>
                    </div>
                    <span class="code-toolbar-lang">C++</span>
                    <button class="copy-btn" type="button" data-code="${encodeURIComponent(item.code)}">📋 Copy</button>
                  </div>
                  <pre class="language-cpp"><code class="language-cpp">${escapeHtml(item.code)}</code></pre>
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }).join("");

      bindCopyButtons();
      applyAnswers(state.showAnswers);
      if (window.Prism) Prism.highlightAll();
    }

    function bindCopyButtons(){
      document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const code = decodeURIComponent(btn.dataset.code || "");
          try {
            await navigator.clipboard.writeText(code);
          } catch(e) {
            const ta = document.createElement("textarea");
            ta.value = code;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
          }
          const old = btn.innerHTML;
          btn.innerHTML = "✅ Copied";
          btn.classList.add("copied");
          setTimeout(() => { btn.innerHTML = old; btn.classList.remove("copied"); }, 1400);
        });
      });
    }

    els.searchInput.addEventListener("input", e => {
      state.search = e.target.value;
      renderContent();
    });

    els.btnPrint.addEventListener("click", () => window.print());
    els.answersSwitch.addEventListener("click", () => applyAnswers(!state.showAnswers));
    els.themeSwitch.addEventListener("click", () => applyTheme(state.theme === "dark" ? "light" : "dark"));

    (function init(){
      renderTabs();
      renderContent();

      const savedTheme = localStorage.getItem("sheet_theme");
      if (savedTheme === "dark" || savedTheme === "light") {
        applyTheme(savedTheme);
      } else {
        const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        applyTheme(systemDark ? "dark" : "light");
      }

      applyAnswers(localStorage.getItem("sheet_answers") === "1");
    })();
  </script>
</body>
</html>
