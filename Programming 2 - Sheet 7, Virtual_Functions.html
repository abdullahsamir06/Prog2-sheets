      // ── MCQ ────────────────────────────────────────────────────────
      {
        id: "mcq", title: "MCQ",
        items: [
          {
            q: "What is polymorphism in C++?",
            options: [
              "The ability to hide data inside a class so it cannot be accessed from outside",
              "The ability of a function or object to take on multiple forms",
              "The ability to create a new class from scratch with no base class",
              "The ability to use the same variable name in different files"
            ],
            correctIndex: 1,
            category: "Polymorphism"
          },
          {
            q: "What are the two types of polymorphism in C++?",
            options: [
              "Compile-time polymorphism (function overloading) and runtime polymorphism (function overriding)",
              "Public polymorphism and private polymorphism",
              "Class polymorphism and object polymorphism",
              "Input polymorphism and output polymorphism"
            ],
            correctIndex: 0,
            category: "Types of Polymorphism"
          },
          {
            q: "A Shape pointer points to a Circle object and calls draw(). Shape declares draw() as virtual. Which version runs?",
            options: [
              "Shape's draw() — because Shape is the parent class",
              "Circle's draw() — because virtual makes the correct version run",
              "Both versions run at the same time",
              "It causes a compile error"
            ],
            correctIndex: 1,
            category: "Virtual Functions"
          },
          {
            q: "What does virtual int area() = 0; mean inside a class?",
            options: [
              "The function area() always returns zero",
              "The function area() is optional — derived classes may or may not define it",
              "The function area() has no body in this class and every derived class must define it",
              "The function area() can only be called from main()"
            ],
            correctIndex: 2,
            category: "Pure Virtual Functions"
          },
          {
            q: "A class has at least one pure virtual function. What does this mean?",
            options: [
              "You can still create objects from it as long as you never call the pure virtual function",
              "This class becomes abstract — you cannot create objects from it directly",
              "This class can no longer be used as a base class",
              "All functions in the class automatically become pure virtual"
            ],
            correctIndex: 1,
            category: "Abstract Classes"
          },
          {
            q: "A friend function is declared inside a class. Which of the following describes it correctly?",
            options: [
              "It is a regular member function of the class",
              "It is defined outside the class but is allowed to access private and protected members of the class",
              "It can only read public members of the class",
              "It is inherited by any class that inherits from this class"
            ],
            correctIndex: 1,
            category: "Friend Function"
          },
          {
            q: "Class A declares: friend class B; inside it. What does this allow?",
            options: [
              "Class A can access the private members of class B",
              "Class B can access the private and protected members of class A",
              "Both class A and class B can access each other's private members",
              "Class B becomes a derived class of class A"
            ],
            correctIndex: 1,
            category: "Friend Class"
          }
        ]
      },

      // ── T/F ────────────────────────────────────────────────────────
      {
        id: "tf", title: "True / False",
        items: [
          {
            q: "A class that has a pure virtual function can be used to create objects directly.",
            answer: "False"
          },
          {
            q: "If a derived class does not define the pure virtual function from its base class, it also becomes abstract and cannot be instantiated.",
            answer: "True"
          },
          {
            q: "A friend function is a member of the class that declares it.",
            answer: "False"
          },
          {
            q: "Class A declares friend class B. This means B can access the private members of A, and A can also access the private members of B.",
            answer: "False"
          },
          {

            answer: "True"
          }
        ]
      },

      // ── OUTPUT ─────────────────────────────────────────────────────
      {
        id: "output", title: "What is the Output?",
        items: [
          {
            q: "What is the output of the following code?",
            code: `#include <iostream>

            answer: `Drawing Shape
Drawing Circle`,

          },
          {
            q: "What is the output of the following code?",

      // ── ERROR ──────────────────────────────────────────────────────
      {
        id: "error", title: "What is the Error?",
        items: [
          {
            q: "Find the error in this code and explain why it happens.",
            code: `#include <iostream>
using namespace std;

class Shape {
public:
    virtual int area() = 0;
};

class Rectangle : public Shape {
private:
    int width, height;
public:
    Rectangle(int w, int h) { width = w; height = h; }
    int area() { return width * height; }
};

int main() {
    Shape s;
    Rectangle r(4, 5);
    cout << r.area() << endl;
    return 0;
}`,
            answer: `Error: Shape s;\n\nShape is an abstract class because it has a pure virtual function ( area() = 0 ).\nYou cannot create objects from an abstract class.\n\nFix: Remove Shape s; — it is not needed.\nRectangle r(4, 5) already works fine on its own.`,
            category: "Abstract Class"
          },
          {
            q: "Find the error in this code and explain why it happens.",
            code: `#include <iostream>
using namespace std;

int main() {
    int x = 10, y = 0;
    try {
        if (y == 0)
            throw "Division by zero";
        else
            cout << x / y << endl;
    }
    catch (int n) {
        cout << "Caught: " << n << endl;
    }
    return 0;
}`,
            answer: `Error: the thrown type and the caught type do not match.

The code throws a text (const char*):
    throw "Division by zero";

But catch expects a number (int):
    catch (int n)

Since the types do not match, the exception is not caught and the program crashes.

Fix: Change catch to match what was thrown:
    catch (const char* msg) {
        cout << msg << endl;
    }`,
            category: "Exception Type Mismatch"
          }
        ]

• parameterized constructor
• pure virtual function: area()

Rectangle (derived from Shape):
• override area() — return width * height

In main():
• create Rectangle(6, 4) and print area()`,

using namespace std;

class Shape {
protected:

public:
    Shape(int w, int h) {

        height = h;
    }
    virtual int area() = 0;
};

class Rectangle : public Shape {
public:

    int area() {

    }
};

int main() {

          },

            q: `Box class:
• private: side (int)

Printer class:

class Box {

}`
          }
        ]
      }

    ]
  };

  // ── Engine ──────────────────────────────────────────────────────────
  const els = {
    tabs: document.getElementById("tabs"),
    content: document.getElementById("content"),
    answersSwitch: document.getElementById("answersSwitch"),
    themeSwitch: document.getElementById("themeSwitch"),
    searchInput: document.getElementById("searchInput"),
    btnPrint: document.getElementById("btnPrint")
  };

  let state = { activeSectionId: data.sections[0]?.id ?? null, showAnswers: false, theme: "light", search: "" };

  function setSwitch(el, on){ el.dataset.on = String(on); el.setAttribute("aria-checked", on ? "true" : "false"); }

  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    state.theme = theme;
    localStorage.setItem("sheet_theme", theme);
    setSwitch(els.themeSwitch, theme === "dark");
    if(window.Prism) setTimeout(() => Prism.highlightAll(), 0);
  }

  function applyAnswers(on){
    state.showAnswers = on;
    localStorage.setItem("sheet_answers", on ? "1" : "0");
    setSwitch(els.answersSwitch, on);
    document.querySelectorAll(".answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".output-answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".error-answer").forEach(a => { a.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".tf-badge").forEach(b => { b.style.display = on ? "inline-block" : "none"; });
    document.querySelectorAll(".code-answer-wrap").forEach(w => { w.style.display = on ? "block" : "none"; });
    document.querySelectorAll(".options .opt").forEach(li => {
      if(on && li.classList.contains("is-correct")) li.classList.add("correct");
      else li.classList.remove("correct");
    });
  }

  function esc(str){ return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
  function getActive(){ return data.sections.find(s => s.id === state.activeSectionId) ?? data.sections[0]; }

  function renderTabs(){
    els.tabs.innerHTML = "";
    data.sections.forEach(sec => {
      const btn = document.createElement("button");
      btn.className = "tab" + (sec.id === state.activeSectionId ? " active" : "");
      btn.innerHTML = `${sec.title} <span class="badge">${sec.items?.length ?? 0}</span>`;
      btn.addEventListener("click", () => { state.activeSectionId = sec.id; state.search = ""; els.searchInput.value = ""; renderTabs(); renderContent(); });
      els.tabs.appendChild(btn);
    });
  }

  function renderContent(){
    const sec = getActive();
    const filtered = (sec.items ?? []).filter(item => {
      if(!state.search.trim()) return true;
      return JSON.stringify(item).toLowerCase().includes(state.search.trim().toLowerCase());
    });

    els.content.innerHTML = filtered.map((item, idx) => {
      const num = idx + 1;
      const hasOptions = Array.isArray(item.options) && item.options.length;
      const hasCode    = !!item.code;
      const hasTextAns = typeof item.answer === "string" && item.answer.trim() !== "";
      const hasTf      = sec.id === "tf" && hasTextAns;
      const isOutput   = sec.id === "output";
      const isError    = sec.id === "error";
      const isWrite    = sec.id === "write";
      const catLabel   = item.category ? `${esc(sec.title)} &bull; ${esc(item.category)}` : esc(sec.title);
      const qClass     = isWrite ? "q write-question" : "q";

      return `
        <div class="${qClass}">
          <div class="qHead">
            <p class="qTitle">${num}) ${esc(item.q)}</p>
            <span class="qMeta">${catLabel}</span>
          </div>
          <div class="qBody">
            ${hasOptions ? `<ol class="options" type="A">${item.options.map((opt,i) => {
              const ic = typeof item.correctIndex === "number" && i === item.correctIndex;
              return `<li class="opt ${ic ? "is-correct" : ""}">${esc(opt)}</li>`;
            }).join("")}</ol>` : ""}
            ${hasTf ? `<div class="tf-badge ${item.answer === "True" ? "tf-true" : "tf-false"}">${esc(item.answer)}</div>` : ""}
            ${isOutput && hasTextAns ? `<div class="output-answer"><div class="label">&#x25BA; Output</div><div>${esc(item.answer)}</div></div>` : ""}
            ${isError  && hasTextAns ? `<div class="error-answer"><div class="label">&#x26A0; Error &amp; Fix</div><div>${esc(item.answer)}</div></div>` : ""}
            ${hasCode ? `
              <div class="${isWrite ? "code-answer-wrap" : "code-question-wrap"}">
                <div class="code-toolbar">
                  <div class="code-toolbar-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
                  <span class="code-toolbar-lang">C++</span>
                  <button class="copy-btn" type="button" data-code="${encodeURIComponent(item.code)}">&#x1F4CB; Copy</button>
                </div>
                <pre class="language-cpp"><code class="language-cpp">${esc(item.code)}</code></pre>
              </div>` : ""}
          </div>
        </div>`;
    }).join("");

    bindCopy();
    applyAnswers(state.showAnswers);
    if(window.Prism) setTimeout(() => Prism.highlightAll(), 0);
  }

  function bindCopy(){
    document.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const code = decodeURIComponent(btn.dataset.code || "");
        try { await navigator.clipboard.writeText(code); } catch(e) {
          const ta = document.createElement("textarea"); ta.value = code;
          document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
        }
        const old = btn.innerHTML;
        btn.innerHTML = "&#x2705; Copied"; btn.classList.add("copied");
        setTimeout(() => { btn.innerHTML = old; btn.classList.remove("copied"); }, 1400);
      });
    });
  }

  els.searchInput.addEventListener("input", e => { state.search = e.target.value; renderContent(); });
  els.btnPrint.addEventListener("click", () => window.print());
  els.answersSwitch.addEventListener("click", () => applyAnswers(!state.showAnswers));
  els.themeSwitch.addEventListener("click", () => applyTheme(state.theme === "dark" ? "light" : "dark"));

  (function init(){
    renderTabs(); renderContent();
    const saved = localStorage.getItem("sheet_theme");
    if(saved === "dark" || saved === "light") applyTheme(saved);
    else applyTheme(window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyAnswers(localStorage.getItem("sheet_answers") === "1");
  })();
  </script>
</body>
</html>
